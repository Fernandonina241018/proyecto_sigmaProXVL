<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <div class="main-container">

        <nav class="navbar-left" id="navbarLeft">
<button class="navbar-left-btn" title="Menú">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M2 4h12M2 8h12M2 12h12"/>
                </svg>
            </button>
        </nav>

        <nav class="navbar" id="mainNavbar">
<button class="navbar-toggle" id="navbarToggle" title="Minimizar navbar">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 6l4 4 4-4"/>
                </svg>
            </button>
            <div class="navbar-tabs">
                <button class="navbar-tab active">Dashboard</button>
                <button class="navbar-tab">Agent</button>
                <button class="navbar-tab">APIs</button>
                <button class="navbar-tab">Servers</button>
                <button class="navbar-tab">Activity</button>
            </div>
        </nav>

<nav class="sidebar" id="sidebar">
            <button class="sidebar-toggle" id="sidebarToggle" title="Minimizar sidebar">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 6l4 4 4-4"/>
                </svg>
            </button>
            <div class="sidebar-tabs">
                <button class="sidebar-tab active">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2.5 2.5h11v11h-11z"/><path d="M2.5 5.5h11M5.5 2.5v11"/></svg>
                    Dashboard
                </button>
                <button class="sidebar-tab">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><path d="M8 2v2M8 12v2M2 8h2M12 8h2"/></svg>
                    Agent
                </button>
                <button class="sidebar-tab">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3h10v10H3z"/><path d="M7 3v10M3 7h10"/></svg>
                    APIs
                </button>
                <button class="sidebar-tab">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="12" height="4" rx="1"/><rect x="2" y="9" width="12" height="4" rx="1"/></svg>
                    Servers
                </button>
                <button class="sidebar-tab">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="5" r="2"/><path d="M8 2v1M4 3h1M8 13v1M12 13h-1"/><path d="M5 8h-1M12 8h1M5 6l-1-1M12 11l1-1"/></svg>
                    Activity
                </button>
            </div>
        </nav>

<!-- Navbar isla flotante (estilo notch iPhone) -->
        <div class="navbar-island" id="navbarIsland">
<button class="navbar-island-btn" id="navbarExpand" title="Expandir navbar">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 10l4-4 4 4"/>
                </svg>
            </button>
        </div>

    </div>

</body>
<script>
document.getElementById('navbarToggle').addEventListener('click', function() {
    document.getElementById('mainNavbar').classList.add('hidden');
    document.getElementById('navbarIsland').classList.add('visible');
});

document.getElementById('navbarExpand').addEventListener('click', function() {
    document.getElementById('mainNavbar').classList.remove('hidden');
    document.getElementById('navbarIsland').classList.remove('visible');
});
</script>
</html>
