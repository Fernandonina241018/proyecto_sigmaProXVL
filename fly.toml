# fly.toml app configuration file generated for sigmaproxvl-backend on 2026-05-29T19:08:25-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sigmaproxvl-backend'
primary_region = 'dfw'

[build]
  dockerfile = 'backend/Dockerfile'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    port = 3000
    type = "http"
    path = "/api/health"
    interval = "15s"
    timeout = "5s"
    healthy_threshold = 2
    unhealthy_threshold = 3

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
