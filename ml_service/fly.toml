# fly.toml for sigmapro-ml (ML Service)
app = 'sigmapro-ml'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    port = 8080
    type = "http"
    path = "/api/ml/health"
    interval = "15s"
    timeout = "5s"
    healthy_threshold = 2
    unhealthy_threshold = 3

[[vm]]
  memory = '2gb'
  cpus = 1
  memory_mb = 2048

[[mounts]]
  source = "ml_models"
  destination = "/app/Red_Neuronal/modelos_guardados"
