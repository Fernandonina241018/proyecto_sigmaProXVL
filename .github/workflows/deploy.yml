name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy backend
        run: flyctl deploy --app sigmaproxvl-backend --strategy immediate --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy ML Service
        run: flyctl deploy --app sigmapro-ml --config ml_service/fly.toml --strategy rolling --yes
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
