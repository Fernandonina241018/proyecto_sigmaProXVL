<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Navbar Mejorado - StatAnalyzer Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0b2dc2 0%, #661ab3 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .demo-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .top-nav {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e293b;
            cursor: pointer;
            flex-shrink: 0;
        }

        .logo-icon {
            width: auto;
            min-width: 50px;
            height: 40px;
            padding: 0 10px;
            border-radius: 10px;
            background: linear-gradient(135deg, #3046ac 0%, #7c3aed 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 0.85rem;
            box-shadow: 0 4px 12px rgba(48, 70, 172, 0.35);
        }

        .nav-center {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            padding: 0 20px;
        }

        .search-box {
            position: relative;
            width: 300px;
            max-width: 100%;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.85rem;
            transition: all 0.2s;
            background: #f8fafc;
        }

        .search-box input:focus {
            outline: none;
            border-color: #3046ac;
            background: white;
            box-shadow: 0 0 0 4px rgba(48, 70, 172, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .notification-btn {
            position: relative;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: none;
            background: #f1f5f9;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .notification-btn:hover {
            background: #e2e8f0;
            transform: scale(1.05);
        }

        .notification-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            font-weight: 600;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-menu {
            position: relative;
        }

        .user-trigger {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 12px 6px 6px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .user-trigger:hover {
            background: #f1f5f9;
            border-color: #e2e8f0;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, #3046ac 0%, #7c3aed 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            box-shadow: 0 2px 8px rgba(48, 70, 172, 0.3);
        }

        .user-avatar.admin {
            background: linear-gradient(135deg, #dc2626 0%, #f97316 100%);
            box-shadow: 0 2px 8px rgba(220, 38, 38, 0.3);
        }

        .user-info {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .user-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: #1e293b;
        }

        .user-role {
            font-size: 0.75rem;
            color: #64748b;
        }

        .user-dropdown-icon {
            color: #94a3b8;
            font-size: 0.8rem;
            transition: transform 0.2s;
        }

        .user-trigger.open .user-dropdown-icon {
            transform: rotate(180deg);
        }

        .user-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            width: 240px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            padding: 8px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        .user-dropdown.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-header {
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
            margin-bottom: 8px;
        }

        .dropdown-header-name {
            font-weight: 600;
            color: #1e293b;
        }

        .dropdown-header-email {
            font-size: 0.8rem;
            color: #64748b;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            color: #475569;
            font-size: 0.9rem;
        }

        .dropdown-item:hover {
            background: #f1f5f9;
            color: #1e293b;
        }

        .dropdown-item-icon {
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
        }

        .dropdown-divider {
            height: 1px;
            background: #f1f5f9;
            margin: 8px 0;
        }

        .dropdown-item.logout {
            color: #dc2626;
        }

        .dropdown-item.logout:hover {
            background: #fef2f2;
            color: #dc2626;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }

        .nav-menu {
            display: flex;
            gap: 4px;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 12px;
            width: 100%;
            order: 4;
            margin-top: 4px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-item {
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            color: #475569;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-item .nav-icon {
            font-size: 1.2rem;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.8);
            color: #1e293b;
        }

        .nav-item.active {
            color: #3046ac;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .nav-item.active .nav-icon {
            font-size: 1.4rem;
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <nav class="top-nav">
            <div class="logo">
                <div class="logo-icon">SAP2.0</div>
                <span>StatAnalyzer Pro 2.0</span>
            </div>
            
            <div class="nav-center">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" placeholder="Buscar...">
                </div>
            </div>
            
            <div class="nav-right">
                
                <button class="notification-btn">
                    🔔
                    <span class="notification-badge">3</span>
                </button>
                
                <div class="user-menu">
                    <div class="user-trigger" onclick="toggleDropdown()">
                        <div class="user-avatar admin">FN</div>
                        <div class="user-info">
                            <span class="user-name">Fernando</span>
                            <span class="user-role">Administrador</span>
                        </div>
                        <span class="user-dropdown-icon">▼</span>
                    </div>
                    
                    <div class="user-dropdown" id="userDropdown">
                        <div class="dropdown-header">
                            <div class="dropdown-header-name">Fernando Nina</div>
                            <div class="dropdown-header-email">fernando@sigmapro.com</div>
                        </div>
                        <div class="dropdown-item">
                            <span class="dropdown-item-icon">👤</span>
                            Mi Perfil
                        </div>
                        <div class="dropdown-item">
                            <span class="dropdown-item-icon">⚙️</span>
                            Configuración
                        </div>
                        <div class="dropdown-divider"></div>
                        <div class="dropdown-item">
                            <span class="dropdown-item-icon">🔒</span>
                            Cambiar Contraseña
                        </div>
                        <div class="dropdown-divider"></div>
                        <div class="dropdown-item logout">
                            <span class="dropdown-item-icon">🚪</span>
                            Cerrar Sesión
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="nav-menu">
                <div class="nav-item active"><span class="nav-icon">📋</span>Trabajo</div>
                <div class="nav-item"><span class="nav-icon">📊</span>Datos</div>
                <div class="nav-item"><span class="nav-icon">🔬</span>Análisis</div>
                <div class="nav-item"><span class="nav-icon">📈</span>Visualización</div>
                <div class="nav-item"><span class="nav-icon">📄</span>Reportes</div>
                <div class="nav-item"><span class="nav-icon">📋</span>Auditoría</div>
                <div class="nav-item"><span class="nav-icon">👥</span>Usuarios</div>
            </div>
        </nav>
    </div>

    <script>
        function toggleDropdown() {
            const trigger = document.querySelector('.user-trigger');
            const dropdown = document.getElementById('userDropdown');
            trigger.classList.toggle('open');
            dropdown.classList.toggle('open');
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.user-menu')) {
                document.querySelector('.user-trigger').classList.remove('open');
                document.getElementById('userDropdown').classList.remove('open');
            }
        });
    </script>
</body>
</html>
